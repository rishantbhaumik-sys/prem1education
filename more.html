<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resources | Prem Education</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --gold: #D4AF37;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 15px;
            border: 1px solid var(--gold);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.4s;
            background: transparent;
        }

        .btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .back-btn {
            margin-top: 30px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Radha Krishna Love</h1>
        <div class="btn-group">
            <a href="pdf.pdf" target="_blank" class="btn">Love Story</a>
            <a href="pdf1.pdf" target="_blank" class="btn">Mahabharat</a>
        </div>
        <a href="index.html" class="back-btn">← Return to Home</a>
    </div>

</body>
</html>
