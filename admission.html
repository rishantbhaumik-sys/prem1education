<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Admission Form | PREM EDUCATION</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* BACKGROUND IMAGE */

body{
background:url("free.jpg") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* FORM CONTAINER */

.container{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:15px;
width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */

.container h2{
text-align:center;
margin-bottom:25px;
color:#4CAF50;
}

/* FORM STYLE */

form{
display:flex;
flex-direction:column;
gap:15px;
}

label{
font-weight:bold;
}

input,select,textarea{

padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

/* BUTTON */

button{

background:#4CAF50;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{

background:#388e3c;
transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<h2>Student Admission Form</h2>

<form action="https://formsubmit.co/rishantbhaumik@gmail.com" method="POST" enctype="multipart/form-data">

<label>Student Name</label> <input type="text" name="Student Name" required>

<label>Age</label> <input type="number" name="Age" required>

<label>Select Course</label> <select name="Course" required>

<option value="">Select Course</option>
<option>Computer Class</option>
<option>English Class</option>
<option>Yoga Class</option>

</select>

<label>Father Name</label> <input type="text" name="Father Name" required>

<label>Mother Name</label> <input type="text" name="Mother Name">

<label>Phone Number</label> <input type="tel" name="Phone Number" required>

<label>Address</label>

<textarea name="Address" rows="3"></textarea>

<label>Upload Student Photo</label> <input type="file" name="Photo">

<button type="submit">Submit Admission</button>

</form>

</div>

</body>
</html>
