<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem Education Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body { background-color: var(--dark-bg); color: white; font-family: 'Poppins', sans-serif; }

        header {
            padding: 60px 20px; text-align: center; border-bottom: 3px solid var(--gold);
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2070');
            background-size: cover;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold); }

        /* --- Music Button --- */
        #music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: var(--gold); color: black; border: none;
            padding: 12px 20px; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transition: 0.3s;
        }
        #music-control:hover { transform: scale(1.1); }

        /* --- Gallery Grid --- */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); grid-gap: 20px; }

        .img-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s;
        }
        .img-card img { width: 100%; height: 300px; object-fit: cover; display: block; pointer-events: none; transition: 0.5s; }
        .img-card:hover { transform: translateY(-8px); border-color: var(--gold); }
        .img-card:hover img { transform: scale(1.1); }

        /* --- Modal --- */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(15px);
            z-index: 10000; justify-content: center; align-items: center;
        }
        #modal img { max-width: 85%; max-height: 80vh; border: 2px solid var(--gold); animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(212, 175, 55, 0.2); color: white; border: 1px solid var(--gold); font-size: 30px; padding: 15px 20px; cursor: pointer; border-radius: 50%; z-index: 10001; }
        .prev-btn { left: 30px; } .next-btn { right: 30px; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 50px; color: white; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bg-music" loop>
        <source src="bhajan.mp3" type="audio/mpeg">
    </audio>

    <button id="music-control" onclick="toggleMusic()">🎵 Play Music</button>

    <header>
        <h1>Prem Education gallery</h1>
        <p>A Sacred Visual Journey</p>
    </header>

    <div class="container">
        <div class="gallery" id="gallery-grid"></div>
    </div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="modal-img" src="">
        <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script>
        const images = ['mandir.jpg', 'mandir1.jpg', 'mandir2.jpg', 'mandir3.jpg', 'ram.jpg', 'ram1.jpg', 'ram2.jpg', 'ram3.jpg', 'ram4.jpg', 'ram5.jpg', 'ram6.jpg', 'ram7.jpg', 'ram8.jpg', 'ram9.jpg', 'ram10.jpg'];
        let currentIndex = 0;

        // Music Logic
        const music = document.getElementById("bg-music");
        const musicBtn = document.getElementById("music-control");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "⏸ Pause Music";
            } else {
                music.pause();
                musicBtn.innerText = "🎵 Play Music";
            }
        }

        // Gallery Grid Load
        const galleryGrid = document.getElementById('gallery-grid');
        images.forEach((src, index) => {
            const card = document.createElement('div');
            card.className = 'img-card';
            card.onclick = () => openModal(index);
            card.innerHTML = `<img src="${src}">`;
            galleryGrid.appendChild(card);
        });

        function openModal(index) {
            currentIndex = index;
            document.getElementById("modal").style.display = "flex";
            document.getElementById("modal-img").src = images[currentIndex];
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            document.body.style.overflow = "auto";
        }

        function changeImage(step) {
            currentIndex = (currentIndex + step + images.length) % images.length;
            document.getElementById("modal-img").src = images[currentIndex];
        }

        // Security & Key Navigation
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) return false;
            if (document.getElementById("modal").style.display === "flex") {
                if (e.key === "ArrowLeft") changeImage(-1);
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "Escape") closeModal();
            }
        };
    </script>
</body>
</html>
