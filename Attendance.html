<!DOCTYPE html>
<html>
<head>
<title>Prem Education Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
flex-direction:column;
color:#00fff7;
}

.spinner{
width:70px;
height:70px;
border:6px solid #222;
border-top:6px solid #00fff7;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.hide{animation:fadeOut 1s forwards;}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

h1{text-align:center;color:#00fff7;margin:15px;}

.loginBox{
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
width:90%;
max-width:320px;
margin:100px auto;
padding:25px;
border-radius:15px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#222;
color:white;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
width:95%;
margin:15px auto;
padding:10px;
border-radius:15px;
display:none;
}

h2{
background:#00fff7;
color:black;
padding:8px;
border-radius:8px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#1a1a1a;
padding:12px;
margin:10px 0;
border-radius:12px;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.photoBox{
width:55px;
height:55px;
border-radius:50%;
overflow:hidden;
border:2px solid #00fff7;
cursor:pointer;
}

.photoBox img{
width:100%;
height:100%;
object-fit:cover;
}

.name{font-weight:bold;}
.status{font-size:12px;color:#aaa;}

.btns{display:flex;gap:5px;}

.present{background:#00c853;}
.absent{background:#d50000;}
.leave{background:#ff9800;}

.send{
display:none;
width:90%;
margin:10px auto;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
border:none;
}

#sendBtn{background:#00fff7;color:black;}
#excelBtn{background:#4caf50;}
#waBtn{background:#25D366;}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<div>Loading Prem Education...</div>
</div>

<div class="loginBox" id="loginBox">
<h2>Password</h2>
<input type="password" id="pass">
<button onclick="checkPass()">Login</button>
</div>

<h1 id="title" style="display:none;">📘 Prem Education Attendance</h1>

<div class="container" id="g1box"><h2>Group 1</h2><div id="g1"></div></div>
<div class="container" id="g2box"><h2>Group 2</h2><div id="g2"></div></div>
<div class="container" id="g3box"><h2>Group 3</h2><div id="g3"></div></div>

<button class="send" id="sendBtn" onclick="sendEmail()">📩 Gmail</button>
<button class="send" id="excelBtn" onclick="downloadExcel()">📥 Excel</button>
<button class="send" id="waBtn" onclick="sendWhatsApp()">📲 WhatsApp</button>

<script>

setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},1500);

function checkPass(){
if(pass.value==="RADHA"){
loginBox.style.display="none";
title.style.display="block";
g1box.style.display="block";
g2box.style.display="block";
g3box.style.display="block";
sendBtn.style.display="block";
excelBtn.style.display="block";
waBtn.style.display="block";
}else{alert("Wrong Password");}
}

// 🔥 DEFAULT IMAGE ADDED
let defaultImg = "t.png";

function createGroup(arr){
return arr.map(n=>({
name:n,
status:"Not Marked",
photo:defaultImg
}));
}

let group1=createGroup(["Kushi","Diksha","Komal","Ayushi","Madhawi","Rudra","Trisha","Dev","Bhola","Aryush","Lakmi","Pooja"]);
let group2=createGroup(["Mohini","Gauri","Kush","Radhika","Aaryan","Rohit","Shorya","Manish","Sandeep","Rishant","Pragati"]);
let group3=createGroup(["Ridhima","Kishori","Anjali S.","Lakki","Anjali K.","Sakshi","Vani","Love","Renu","Shiv","Kuldeep","Ganesh","Lakshe"]);

function save(){
localStorage.setItem("attendanceData",JSON.stringify({
g1:group1,g2:group2,g3:group3
}));
}

function setStatus(g,i,s){
g[i].status=s;
save();
show();
}

function uploadPhoto(input,g,i){
let file=input.files[0];
if(file){
let reader=new FileReader();
reader.onload=function(e){
g[i].photo=e.target.result;
save();
show();
};
reader.readAsDataURL(file);
}
}

function show(){
render(group1,"g1",1);
render(group2,"g2",2);
render(group3,"g3",3);
}

function render(g,id,no){
let box=document.getElementById(id);
box.innerHTML="";
g.forEach((s,i)=>{
let inputId=`file_${no}_${i}`;

box.innerHTML+=`
<div class="card">
<div class="left">

<div class="photoBox" onclick="document.getElementById('${inputId}').click()">
<img src="${s.photo}">
</div>

<input type="file" id="${inputId}" accept="image/*" hidden
onchange="uploadPhoto(this,group${no},${i})">

<div>
<div class="name">${s.name}</div>
<div class="status">${s.status}</div>
</div>

</div>

<div class="btns">
<button class="present" onclick="setStatus(group${no},${i},'Present')">✔</button>
<button class="absent" onclick="setStatus(group${no},${i},'Absent')">❌</button>
<button class="leave" onclick="setStatus(group${no},${i},'Leave')">🟡</button>
</div>
</div>`;
});
}

function sendWhatsApp(){
let t="Attendance\n\n";
[group1,group2,group3].forEach((g,i)=>g.forEach(s=>t+=`Group${i+1}-${s.name}-${s.status}\n`));
window.open("https://wa.me/?text="+encodeURIComponent(t));
}

function sendEmail(){
let t="Attendance\n\n";
[group1,group2,group3].forEach((g,i)=>g.forEach(s=>t+=`Group${i+1}-${s.name}-${s.status}\n`));
window.open("https://mail.google.com/mail/?view=cm&fs=1&body="+encodeURIComponent(t));
}

function downloadExcel(){
let d=new Date().toLocaleDateString();
let csv="Date,Group,Name,Status\n";
[group1,group2,group3].forEach((g,i)=>g.forEach(s=>csv+=`${d},Group${i+1},${s.name},${s.status}\n`));
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="attendance.csv";
a.click();
}

show();

</script>

</body>
</html>
