<!DOCTYPE html>
<html>
<head>
<title>Prem Education Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
}

/* 🔄 LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
flex-direction:column;
color:#00fff7;
}

.spinner{
width:60px;
height:60px;
border:5px solid #222;
border-top:5px solid #00fff7;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.hide{animation:fadeOut 1s forwards;}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

h1{text-align:center;color:#00fff7;margin:10px;}

.loginBox{
background:#111;
color:white;
width:90%;
max-width:320px;
margin:80px auto;
padding:20px;
border-radius:12px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

.container{
background:#111;
width:95%;
margin:10px auto;
padding:10px;
border-radius:12px;
display:none;
}

h2{
background:#00fff7;
color:black;
padding:8px;
border-radius:6px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#1a1a1a;
padding:10px;
margin:10px 0;
border-radius:10px;
flex-wrap:wrap;
}

.left{display:flex;align-items:center;gap:10px;}

.photoBox{
width:50px;height:50px;border-radius:50%;
background:#333;display:flex;
justify-content:center;align-items:center;
color:#00fff7;font-size:22px;
cursor:pointer;overflow:hidden;
}

.photoBox img{
width:100%;
height:100%;
object-fit:cover;
}

.name{color:white;font-weight:bold;}
.status{color:#aaa;font-size:12px;}

.btns{display:flex;gap:5px;}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.present{background:green;color:white;}
.absent{background:red;color:white;}
.leave{background:orange;color:white;}

.send{
display:none;
width:90%;
margin:10px auto;
padding:12px;
background:#00fff7;
color:black;
border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔄 LOADER -->
<div id="loader">
<div class="spinner"></div>
<div>Loading Prem Education...</div>
</div>

<div class="loginBox" id="loginBox">
<h2>Password</h2>
<input type="password" id="pass">
<button onclick="checkPass()">Login</button>
</div>

<h1 id="title" style="display:none;">📘 Prem Education Attendance</h1>

<div class="container" id="g1box"><h2>Group 1</h2><div id="g1"></div></div>
<div class="container" id="g2box"><h2>Group 2</h2><div id="g2"></div></div>
<div class="container" id="g3box"><h2>Group 3</h2><div id="g3"></div></div>

<button class="send" id="sendBtn" onclick="sendEmail()">📩 Gmail</button>
<button class="send" id="excelBtn" onclick="downloadExcel()">📥 Excel</button>
<button class="send" id="waBtn" onclick="sendWhatsApp()">📲 WhatsApp</button>

<script>

// 🔄 LOADER HIDE
setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},2000);

// 🔐 PASSWORD
function checkPass(){
if(pass.value==="RADHA"){
loginBox.style.display="none";
title.style.display="block";
g1box.style.display="block";
g2box.style.display="block";
g3box.style.display="block";
sendBtn.style.display="block";
excelBtn.style.display="block";
waBtn.style.display="block";
}else{alert("Wrong Password");}
}

// ✅ FULL STUDENT LIST

let group1=[
"Kushi","Diksha","Komal","Ayushi","Madhawi","Rudra","Trisha","Dev","Bhola","Aryush","Lakmi","Pooja"
].map(n=>({name:n,status:"Not Marked"}));

let group2=[
"Mohini","Gauri","Kush","Radhika","Aaryan","Rohit","Shorya","Manish","Sandeep","Rishant","Pragati"
].map(n=>({name:n,status:"Not Marked"}));

let group3=[
"Ridhima","Kishori","Anjali S.","Lakki","Anjali K.","Sakshi","Vani","Love","Renu","Shiv","Kuldeep","Ganesh","Lakshe"
].map(n=>({name:n,status:"Not Marked"}));

// 🔁 LOAD SAVED DATA
if(localStorage.getItem("attendanceData")){
let saved=JSON.parse(localStorage.getItem("attendanceData"));
group1=saved.g1;
group2=saved.g2;
group3=saved.g3;
}

// 💾 SAVE
function save(){
localStorage.setItem("attendanceData",JSON.stringify({
g1:group1,g2:group2,g3:group3
}));
}

// ✅ STATUS
function setStatus(g,i,s){
g[i].status=s;
save();
show();
}

// 📸 PHOTO UPLOAD
function uploadPhoto(input,g,i){
let file=input.files[0];
if(file){
let reader=new FileReader();
reader.onload=function(e){
g[i].photo=e.target.result;
save();
show();
}
reader.readAsDataURL(file);
}
}

// UI RENDER
function show(){
render(group1,"g1",1);
render(group2,"g2",2);
render(group3,"g3",3);
}

function render(g,id,no){
let box=document.getElementById(id);
box.innerHTML="";

g.forEach((s,i)=>{
box.innerHTML+=`
<div class="card">

<div class="left">
<label class="photoBox">
${s.photo?`<img src="${s.photo}">`:"➕"}
<input type="file" accept="image/*" style="display:none"
onchange="uploadPhoto(this,group${no},${i})">
</label>

<div>
<div class="name">${s.name}</div>
<div class="status">${s.status}</div>
</div>
</div>

<div class="btns">
<button class="present" onclick="setStatus(group${no},${i},'Present')">✔</button>
<button class="absent" onclick="setStatus(group${no},${i},'Absent')">❌</button>
<button class="leave" onclick="setStatus(group${no},${i},'Leave')">🟡</button>
</div>

</div>`;
});
}

// 📲 WHATSAPP
function sendWhatsApp(){
let text="Attendance\n\n";
[group1,group2,group3].forEach((g,i)=>{
g.forEach(s=>text+=`Group${i+1} - ${s.name} - ${s.status}\n`);
});
window.open("https://wa.me/918077704442?text="+encodeURIComponent(text));
}

// 📩 EMAIL
function sendEmail(){
let text="Attendance\n\n";
[group1,group2,group3].forEach((g,i)=>{
g.forEach(s=>text+=`Group${i+1} - ${s.name} - ${s.status}\n`);
});
window.open("https://mail.google.com/mail/?view=cm&fs=1&to=rishantbhaumik@gmail.com&body="+encodeURIComponent(text));
}

// 📥 EXCEL
function downloadExcel(){
let date=new Date().toLocaleDateString();
let csv="Date,Group,Name,Status\n";

[group1,group2,group3].forEach((g,i)=>{
g.forEach(s=>{
csv+=`${date},Group${i+1},${s.name},${s.status}\n`;
});
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="attendance.csv";
a.click();
}

// INIT
show();

</script>
</body>
</html>
