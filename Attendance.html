<!DOCTYPE html>
<html>
<head>
  <title>Prem Education Attendance</title>

  <link rel="icon" type="image/jpg" href="logo.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin:0;
      padding:0;
      text-align:center;
    }

    h1{
      color:white;
      margin:20px;
    }

    .container{
      background:white;
      width:95%;
      max-width:1000px;
      margin:auto;
      padding:25px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      display:none;
    }

    .loginBox{
      background:white;
      width:300px;
      margin:100px auto;
      padding:20px;
      border-radius:10px;
    }

    input{
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin:5px;
    }

    .addBtn{ background:#28a745; color:white; }
    .present{ background:#28a745; color:white; }
    .absent{ background:#dc3545; color:white; }
    .delete{ background:#ff9800; color:white; }
    .send{ background:#007bff; color:white; width:100%; }

    table{
      width:100%;
      margin-top:20px;
      border-collapse: collapse;
    }

    th{
      background:#007bff;
      color:white;
      padding:10px;
    }

    td{
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    img{
      width:60px;
      height:60px;
      border-radius:50%;
      object-fit:cover;
    }
  </style>
</head>
<body>

<!-- 🔐 LOGIN SCREEN -->
<div class="loginBox" id="loginBox">
  <h2>Enter Password</h2>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="checkPass()">Login</button>
</div>

<!-- 📘 MAIN APP -->
<h1 id="title" style="display:none;">📘 Prem Education Attendance</h1>

<div class="container" id="app">

  <input id="name" placeholder="Student Name">
  <input type="file" id="photo" accept="image/*"><br>
  <button class="addBtn" onclick="addStudent()">➕ Add Student</button>

  <table>
    <thead>
      <tr>
        <th>Photo</th>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <button class="send" onclick="sendEmail()">📩 Send to Gmail</button>

</div>

<script>

// 🔐 PASSWORD CHECK
function checkPass(){
  let p = document.getElementById("pass").value.trim();

  if(p === "RADHA"){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("title").style.display = "block";
  } else {
    alert("Wrong Password");
  }
}

// 📊 DATA SYSTEM
let students = JSON.parse(localStorage.getItem("students")) || [];

function addStudent(){
  let name = document.getElementById("name").value.trim();
  let file = document.getElementById("photo").files[0];

  if(name=="") return alert("Enter student name");

  if(file){
    let reader = new FileReader();
    reader.onload = function(e){
      saveStudent(name, e.target.result);
    }
    reader.readAsDataURL(file);
  } else {
    saveStudent(name, "");
  }
}

function saveStudent(name, photo){
  students.push({name, photo, status:"Not Marked"});
  localStorage.setItem("students", JSON.stringify(students));

  document.getElementById("name").value="";
  document.getElementById("photo").value="";
  show();
}

function setStatus(i, status){
  students[i].status = status;
  localStorage.setItem("students", JSON.stringify(students));
  show();
}

function deleteStudent(i){
  if(confirm("Delete this student?")){
    students.splice(i,1);
    localStorage.setItem("students", JSON.stringify(students));
    show();
  }
}

function show(){
  let data = document.getElementById("data");
  data.innerHTML="";

  students.forEach((s,i)=>{
    let photo = s.photo || "https://via.placeholder.com/60";

    data.innerHTML += `
      <tr>
        <td><img src="${photo}"></td>
        <td>${s.name}</td>
        <td>${s.status}</td>
        <td>
          <button class="present" onclick="setStatus(${i}, 'Present')">✔</button>
          <button class="absent" onclick="setStatus(${i}, 'Absent')">❌</button>
          <button class="delete" onclick="deleteStudent(${i})">🗑</button>
        </td>
      </tr>
    `;
  });
}

function sendEmail(){
  let text = "📘 Prem Education Attendance Report\n\n";

  students.forEach(s=>{
    text += s.name + " - " + s.status + "\\n";
  });

  let url = "https://mail.google.com/mail/?view=cm&fs=1"
          + "&to=rishantbhaumik@gmail.com"
          + "&su=Prem Education Attendance Report"
          + "&body=" + encodeURIComponent(text);

  window.open(url, "_blank");
}

show();

</script>

</body>
</html>
