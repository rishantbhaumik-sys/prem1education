<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Education AI</title>

<!-- ✅ FAVICON -->
<link rel="icon" type="image/jpg" href="logo.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body class="bg-[#0f172a] text-white" x-data="chatApp()" x-init="init()">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-[#020617] border-r border-gray-800 flex flex-col">

    <div class="p-3">
        <button @click="createChat()" class="w-full bg-blue-600 py-2 rounded">
            + New Chat
        </button>
    </div>

    <div class="flex-1 overflow-y-auto">
        <template x-for="chat in chats">
            <div @click="loadChat(chat.id)"
                 class="p-3 cursor-pointer hover:bg-gray-800 text-sm border-b border-gray-800"
                 x-text="chat.title">
            </div>
        </template>
    </div>

</div>

<!-- MAIN -->
<div class="flex flex-col flex-1 max-w-md mx-auto">

<!-- HEADER -->
<header class="p-4 flex justify-between border-b border-gray-800">
    <h1>Prem Education AI</h1>

    <button @click="privateMode=!privateMode"
        :class="privateMode?'bg-red-500':'bg-green-500'"
        class="px-2 py-1 text-xs rounded">
        <span x-text="privateMode?'Private':'Save'"></span>
    </button>
</header>

<!-- CHAT -->
<div id="chat-box" class="flex-1 overflow-y-auto p-3 space-y-3">

<template x-for="msg in messages">
<div :class="msg.role==='user'?'text-right':'text-left'">

<div :class="msg.role==='user'?'bg-blue-600':'bg-[#1e293b]'"
     class="inline-block px-4 py-2 rounded-2xl max-w-[85%] text-sm">

    <!-- IMAGE -->
    <template x-if="msg.image">
        <img :src="msg.image" class="mb-2 rounded-lg max-h-40">
    </template>

    <div x-html="render(msg.content)"></div>

</div>
</div>
</template>

<div x-show="loading" class="text-xs text-gray-400 animate-pulse">
🤖 Thinking...
</div>

</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 border-t border-gray-800">

<input x-model="userInput" @keydown.enter="send()"
       class="flex-1 bg-[#1e293b] px-4 py-2 rounded-full"
       placeholder="Ask anything...">

<button @click="imageSearch()" class="bg-purple-600 px-3 rounded-full">
🖼️
</button>

<button @click="send()" class="bg-blue-600 px-4 rounded-full">
Send
</button>

</div>

</div>

</div>

<script>
function chatApp(){
return{

userInput:'',
messages:[],
chats:JSON.parse(localStorage.getItem("allChats"))||[],
currentChatId:null,
privateMode:false,
loading:false,

init(){
if(this.chats.length){
this.loadChat(this.chats[0].id)
}else{
this.createChat()
}
},

createChat(){
let id=Date.now()

let newChat={
id:id,
title:"New Chat",
messages:[{role:'model',content:'👋 Hello! I am Prem Education AI.'}]
}

this.chats.unshift(newChat)
this.currentChatId=id
this.messages=newChat.messages
this.saveChats()
},

loadChat(id){
let chat=this.chats.find(c=>c.id===id)
this.currentChatId=id
this.messages=chat.messages
},

saveChats(){
if(!this.privateMode){
localStorage.setItem("allChats",JSON.stringify(this.chats))
}
},

updateCurrentChat(){
let chat=this.chats.find(c=>c.id===this.currentChatId)
chat.messages=this.messages

if(chat.title==="New Chat"){
chat.title=this.messages[1]?.content?.slice(0,20)||"Chat"
}

this.saveChats()
},

// casual AI
isCasual(t){
t=t.toLowerCase()
return t.includes("hello")||t.includes("hi")||t.includes("kaise ho")||t.includes("kon ho")
},

getReply(){
const r=[
"😊 Main bilkul theek hoon!",
"👋 Hello! Kaise help karu?",
"🤖 Main Prem Education AI hoon.",
"👍 Batao kya jaana hai?"
]
return r[Math.floor(Math.random()*r.length)]
},

async send(){
if(!this.userInput.trim()||this.loading)return

let q=this.userInput
this.messages.push({role:'user',content:q})
this.userInput=''
this.loading=true

if(this.isCasual(q)){
this.messages.push({role:'model',content:this.getReply()})
this.loading=false
this.updateCurrentChat()
this.scroll()
return
}

try{
let r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`)
let d=await r.json()

let text=d.extract?d.extract.slice(0,200):"❌ No answer"

this.messages.push({
role:'model',
content:text,
image:d.thumbnail?d.thumbnail.source:null
})

}catch{
this.messages.push({role:'model',content:'❌ Error'})
}

this.loading=false
this.updateCurrentChat()
this.scroll()
},

// ✅ FIXED IMAGE SEARCH
async imageSearch(){
if(!this.userInput.trim()) return

let q=this.userInput
this.messages.push({role:'user',content:"🖼️ "+q})
this.userInput=''
this.loading=true

try{

let search = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`)
let searchData = await search.json()

if(!searchData.query.search.length){
this.messages.push({role:'model',content:'❌ Image nahi mila'})
this.loading=false
return
}

let title = searchData.query.search[0].title

let imgRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=500&format=json&origin=*`)
let imgData = await imgRes.json()

let pages = imgData.query.pages
let page = Object.values(pages)[0]

if(page.thumbnail){
this.messages.push({
role:'model',
content:"Here is the image:",
image:page.thumbnail.source
})
}else{
this.messages.push({role:'model',content:'❌ Image nahi mila'})
}

}catch(e){
this.messages.push({role:'model',content:'❌ Error'})
}

this.loading=false
this.updateCurrentChat()
this.scroll()
},

render(c){
return marked.parse(c)
},

scroll(){
setTimeout(()=>{
let b=document.getElementById('chat-box')
b.scrollTop=b.scrollHeight
},100)
}

}
}
</script>

</body>
</html>
