<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREM EDUCATION AI</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .prose pre { background: #111827; padding: 1rem; border-radius: 0.5rem; border: 1px solid #374151; overflow-x: auto; }
        .prose code { color: #ec4899; font-family: monospace; }
        .ai-bubble { background: #1e293b; border: 1px solid #334155; }
        .user-bubble { background: rgba(37, 99, 235, 0.1); border: 1px solid rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-200 font-sans" x-data="chatApp()" x-init="init()">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-[#111827] flex-shrink-0 flex flex-col border-r border-gray-800 transition-all" :class="sidebarOpen ? 'ml-0' : '-ml-72'">
            <div class="p-5 border-b border-gray-800 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo.jpg" alt="Logo" class="w-8 h-8 rounded shadow-lg object-cover">
                    <h1 class="font-bold text-xs uppercase tracking-tighter text-blue-400">Prem Education AI</h1>
                </div>
                <button @click="createNewChat()" class="p-1.5 hover:bg-gray-800 rounded border border-gray-700 text-gray-400">+</button>
            </div>
            
            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <template x-for="chat in chatHistory" :key="chat.id">
                    <div @click="loadChat(chat.id)" 
                         :class="currentChatId === chat.id ? 'bg-blue-600/10 border-blue-500/50 text-white' : 'text-gray-500 border-transparent hover:bg-gray-800/50'"
                         class="p-3 rounded-lg cursor-pointer border transition-all flex justify-between items-center group">
                        <span class="truncate text-xs font-medium" x-text="chat.title || 'New Session'"></span>
                        <button @click.stop="deleteChat(chat.id)" class="opacity-0 group-hover:opacity-100 hover:text-red-400">×</button>
                    </div>
                </template>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            <header class="h-14 border-b border-gray-800 flex items-center px-4 justify-between bg-[#0f172a]/50 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:bg-gray-800 rounded-lg text-gray-400">☰</button>
                    <div class="hidden md:block">
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Status: <span class="text-green-500">Connected</span></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-mono text-gray-500 bg-gray-800 px-2 py-1 rounded" x-text="settings.model"></span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6" id="chat-container">
                <div class="max-w-3xl mx-auto space-y-8">
                    <template x-for="(msg, index) in messages" :key="index">
                        <div class="flex gap-4" :class="msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'">
                            <div class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-bold border border-gray-700"
                                 :class="msg.role === 'user' ? 'bg-blue-600 border-blue-500' : 'bg-gray-800'">
                                <span x-text="msg.role === 'user' ? 'U' : 'AI'"></span>
                            </div>
                            <div :class="msg.role === 'user' ? 'user-bubble' : 'ai-bubble'" 
                                 class="rounded-2xl px-5 py-3 max-w-[85%] shadow-sm">
                                <div class="prose prose-invert prose-sm max-w-none" x-html="renderMarkdown(msg.content)"></div>
                            </div>
                        </div>
                    </template>
                    
                    <div x-show="loading" class="flex gap-4">
                        <div class="w-8 h-8 rounded-lg bg-gray-800 border border-gray-700 animate-pulse"></div>
                        <div class="ai-bubble rounded-2xl px-5 py-3 flex gap-1 items-center">
                            <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></span>
                            <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.15s]"></span>
                            <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.3s]"></span>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="p-4 md:p-6">
                <div class="max-w-3xl mx-auto relative">
                    <textarea 
                        x-model="userInput" 
                        @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
                        placeholder="Type a message to Prem Education AI..."
                        class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 pr-14 focus:outline-none focus:ring-1 focus:ring-blue-500/50 resize-none min-h-[56px] text-sm"
                        rows="1"></textarea>
                    <button @click="sendMessage()" :disabled="loading" class="absolute right-2 bottom-2 p-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 text-white rounded-xl transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <p class="text-[9px] text-center text-gray-600 mt-4 tracking-tighter uppercase font-medium">Prem Education AI System &copy; 2026</p>
            </footer>
        </main>
    </div>

    <script>
        function chatApp() {
            return {
                sidebarOpen: window.innerWidth > 1024,
                userInput: '',
                loading: false,
                currentChatId: null,
                messages: [],
                chatHistory: [],
                
                // --- YOUR NEW API KEY ---
                settings: {
                    apiKey: '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', 
                    model: 'openai/gpt-4o-mini'
                },

                init() {
                    // Purana cache clear karein taaki nayi key refresh ho
                    const savedHistory = localStorage.getItem('prem_edu_history_v1');
                    if (savedHistory) {
                        this.chatHistory = JSON.parse(savedHistory);
                    }

                    if (this.chatHistory.length > 0) {
                        this.loadChat(this.chatHistory[0].id);
                    } else {
                        this.createNewChat();
                    }
                },

                createNewChat() {
                    const id = Date.now().toString();
                    this.currentChatId = id;
                    this.messages = [];
                    this.chatHistory.unshift({ id, title: 'New Lesson', messages: [] });
                    this.saveHistory();
                },

                loadChat(id) {
                    const chat = this.chatHistory.find(c => c.id === id);
                    if (chat) {
                        this.currentChatId = id;
                        this.messages = [...chat.messages];
                        this.scrollToBottom();
                    }
                },

                deleteChat(id) {
                    this.chatHistory = this.chatHistory.filter(c => c.id !== id);
                    if (this.currentChatId === id) this.createNewChat();
                    this.saveHistory();
                },

                async sendMessage() {
                    if (!this.userInput.trim() || this.loading) return;
                    
                    const prompt = this.userInput;
                    this.messages.push({ role: 'user', content: prompt });
                    this.userInput = '';
                    this.loading = true;
                    this.scrollToBottom();

                    const currentChat = this.chatHistory.find(c => c.id === this.currentChatId);
                    if (currentChat && currentChat.messages.length === 0) {
                        currentChat.title = prompt.substring(0, 30);
                    }

                    try {
                        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${this.settings.apiKey}`,
                                "Content-Type": "application/json",
                                "X-Title": "Prem Education AI"
                            },
                            body: JSON.stringify({
                                "model": this.settings.model,
                                "messages": this.messages.map(m => ({ role: m.role, content: m.content }))
                            })
                        });

                        const data = await response.json();
                        
                        if (data.error) {
                            throw new Error(data.error.message || "API Rejected Key");
                        }
                        
                        this.messages.push({ role: 'assistant', content: data.choices[0].message.content });
                        
                        if (currentChat) {
                            currentChat.messages = [...this.messages];
                            this.saveHistory();
                        }
                    } catch (error) {
                        this.messages.push({ 
                            role: 'assistant', 
                            content: `❌ **Connection Error:** ${error.message}\n\n*Solution: Check if OpenRouter key has credits.*` 
                        });
                    } finally {
                        this.loading = false;
                        this.scrollToBottom();
                    }
                },

                saveHistory() {
                    localStorage.setItem('prem_edu_history_v1', JSON.stringify(this.chatHistory));
                },

                renderMarkdown(content) {
                    return marked.parse(content);
                },

                scrollToBottom() {
                    setTimeout(() => {
                        const container = document.getElementById('chat-container');
                        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                    }, 100);
                }
            }
        }
    </script>
</body>
</html>
